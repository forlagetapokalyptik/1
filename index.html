<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APOKALYPTIK</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body:not(.splash-hidden) .page-wrapper,
    body:not(.splash-hidden) .top-image,
    body:not(.splash-hidden) .bottom-image {
      display: none;
    }
  </style>
</head>
  
<body>

  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="splash-content">
      <img src="billeder/apokalyptik-tekst.png" alt="Apokalyptik tekst" class="splash-text">
      <div class="splash-logo-wrapper">
        <button class="enter-btn" id="enterBtn">
          <img src="billeder/apokalyptik-logo.png" alt="Apokalyptik logo" class="splash-logo">
        </button>
      </div>
    </div>
  </div>

  <!-- Top baggrund -->
  <div class="top-image"></div>

  <!-- Alt indhold i wrapper -->
  <div class="page-wrapper">
    <header>
<nav>
  <ul class="nav-left">
    <li><a href="/udgivelser/">UDGIVELSER</a></li>
    <li><a href="/forlaget/">FORLAGET</a></li>
  </ul>
  <div class="nav-center">
    <a href="../">
      <img src="billeder/apokalyptik-tekst-2.png" alt="Apokalyptik" class="nav-title-img">
    </a>
  </div>
  <ul class="nav-right">
    <li><a href="/arkivet/">ARKIVET</a></li>
    <li><a href="/kontakt/">KONTAKT</a></li>
  </ul>
</nav>
    </header>
    <main>
      <section class="hero">
        <h2></h2>
      </section>
    </main>
    <footer>
      <p>&copy; 2026 APOKALYPTIK</p>
    </footer>
    <div class="bottom-image"></div>
  </div>

  <script>
    const splash = document.getElementById('splash-screen');
    const enterBtn = document.getElementById('enterBtn');

    function hideSplash() {
      splash.classList.add('hidden');
      document.body.classList.add('splash-hidden');
      setTimeout(() => {
        splash.style.display = 'none';
      }, 800);
    }

    enterBtn.addEventListener('click', hideSplash);

    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter' && !splash.classList.contains('hidden')) {
        hideSplash();
      }
    });

window.addEventListener('scroll', function() {
  const scrollTop = window.scrollY;
  const maxScroll = document.body.scrollHeight - window.innerHeight;
  const progress = scrollTop / maxScroll;
  const maxOpacity = 0.6;
  const opacity = maxOpacity - maxOpacity * progress;
  const bg = document.querySelector('.top-image');
  bg.style.setProperty('--bg-opacity', opacity);
});
    
  </script>

</body>
</html>
