<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apokalyptik</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body:not(.splash-hidden) .page-wrapper,
    body:not(.splash-hidden) .top-image,
    body:not(.splash-hidden) .bottom-image {
      display: none;
    }
  </style>
</head>
  
<body>

  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="splash-content">
      <img src="billeder/apokalyptik-tekst.png" alt="Apokalyptik tekst" class="splash-text">
      <div class="splash-logo-wrapper">
        <button class="enter-btn" id="enterBtn">
          <img src="billeder/apokalyptik-logo.png" alt="Apokalyptik logo" class="splash-logo">
        </button>
      </div>
    </div>
  </div>

  <!-- Top baggrund -->
  <div class="top-image"></div>

  <!-- Alt indhold i wrapper -->
  <div class="page-wrapper">
    <header>
      <nav>
        <h1><a href="./">APOKALYPTIK</a></h1>
        <ul>    
          <li class="dropdown">
            <a href="#" class="dropbtn">MENU</a>
            <div class="dropdown-content">
              <a href="/udgivelser/">UDGIVELSER</a>
              <a href="/kommende-udgivelser/">KOMMENDE UDGIVELSER</a>
              <a href="/om-forlaget/">OM FORLAGET</a>
              <a href="/kontakt/">KONTAKT</a>
            </div>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="hero">
        <h2></h2>
      </section>
    </main>
    <footer>
      <p>&copy; 2026 apokalyptik.</p>
    </footer>
    <div class="bottom-image"></div>
  </div>

  <script>
    const splash = document.getElementById('splash-screen');
    const enterBtn = document.getElementById('enterBtn');

    function hideSplash() {
      splash.classList.add('hidden');
      document.body.classList.add('splash-hidden');
      setTimeout(() => {
        splash.style.display = 'none';
      }, 800);
    }

    enterBtn.addEventListener('click', hideSplash);

    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter' && !splash.classList.contains('hidden')) {
        hideSplash();
      }
    });
  </script>

</body>
</html>
