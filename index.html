<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apokalyptik</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body:not(.splash-hidden) .page-wrapper,
    body:not(.splash-hidden) .top-image,
    body:not(.splash-hidden) .bottom-image {
      display: none;
    }
  </style>
</head>
  
<body>

  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="splash-content">
      <h1>Apokalyptik</h1>
      <p></p>
      <div class="splash-logo-wrapper">
        <img src="billeder/apokalyptik-tekst.png" alt="Apokalyptik tekst" class="splash-text">
        <button class="enter-btn" id="enterBtn">
          <img src="billeder/apokalyptik-logo.png" alt="Apokalyptik logo" class="splash-logo">
        </button>
      </div>
    </div>
  </div>

  <!-- Top baggrund -->
  <div class="top-image"></div>

  <!-- Alt indhold i wrapper -->
  <div class="page-wrapper">
    <header>
      <nav>
        <h1><a href="./">apokalyptik</a></h1>
        <ul>    
          <li class="dropdown">
            <a href="#" class="dropbtn">menu</a>
            <div class="dropdown-content">
              <a href="/udgivelser/">udgivelser</a>
              <a href="/kommende-udgivelser/">kommende udgivelser</a>
              <a href="/om-forlaget/">om forlaget</a>
              <a href="/kontakt/">kontakt</a>
            </div>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="hero">
        <h2>forlag for fordærvelig litteratur</h2>
      </section>
    </main>
    <footer>
      <p>&copy; 2025 apokalyptik.</p>
    </footer>
    <div class="bottom-image"></div>
  </div>

  <script>
    const splash = document.getElementById('splash-screen');
    const enterBtn = document.getElementById('enterBtn');
    
    const hasSeenSplash = sessionStorage.getItem('hasSeenSplash');
    
    if (hasSeenSplash) {
      splash.style.display = 'none';
      document.body.classList.add('splash-hidden');
    }
