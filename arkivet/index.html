<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARKIVET - APOKALYPTIK</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- Top baggrund -->
  <div class="top-image"></div>
  <!-- Alt indhold i wrapper -->
  <div class="page-wrapper">    
    <header>
      <nav>
        <ul class="nav-left">
          <li><a href="/udgivelser/">UDGIVELSER</a></li>
          <li><a href="/forlaget/">FORLAGET</a></li>
        </ul>
        <div class="nav-center">
          <a href="../">
            <img src="../billeder/apokalyptik-tekst-2.png" alt="Apokalyptik" class="nav-title-img">
          </a>
        </div>
        <ul class="nav-right">
          <li><a href="/arkivet/">ARKIVET</a></li>
          <li><a href="/kontakt/">KONTAKT</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <h1 class="page-title">ARKIVET</h1>

      <div class="content centered">
        <p class="arkiv-beskrivelse">ARKIVET er et bibliotek over forfattere med værker på originalsprog og i oversættelse, som enten er udgivet eller formateret af forlaget.</p>
      </div>

      <div class="arkiv-liste">

        <!-- FORFATTER SKABELON – kopiér denne blok for hver forfatter -->
        <div class="arkiv-forfatter">
          <a href="/arkivet/forfattere/schopenhauer/">SCHOPENHAUER, ARTHUR</a>
        </div>
        <!-- SLUT PÅ FORFATTER SKABELON -->

      </div>
    </main>

    <footer>
        <p>&copy; 2026 APOKALYPTIK</p>
    </footer>
    <!-- Bund-baggrund nederst i wrapper -->
    <div class="bottom-image"></div>
  </div>

    <script>
    window.addEventListener('scroll', function() {
      const scrollTop = window.scrollY;
      const maxScroll = document.body.scrollHeight - window.innerHeight;
      const progress = scrollTop / maxScroll;
      const maxOpacity = 0.6;
      const opacity = maxOpacity - maxOpacity * progress;
      const bg = document.querySelector('.top-image');
      bg.style.setProperty('--bg-opacity', opacity);
    });
  </script>

</body>
</html>
